name: CI

on:
  push:
    branches:
      - windows-shared
  workflow_dispatch:

jobs:
  windows-shared:
    strategy:
      matrix:
        include:
          - { arch: x86_64, runner: windows-latest, msvc-arch: amd64, gvsbuild-arch: x64 }
          - { arch: arm64, runner: windows-11-arm, msvc-arch: arm64, gvsbuild-arch: arm64 }
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc-arch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install meson ninja gvsbuild

      - name: Restore GTK cache
        id: gtk-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-${{ matrix.arch }}-v3

      - name: Build GTK dependencies
        if: steps.gtk-cache.outputs.cache-hit != 'true'
        run: gvsbuild build --ninja-opts -j2 gtk4 gobject-introspection json-glib libsoup3

      - name: Save GTK cache
        if: steps.gtk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\gtk-build
          key: gvsbuild-${{ matrix.arch }}-v3

      - name: Set up GTK environment
        shell: bash
        run: |
          echo "C:\\gtk-build\\gtk\\${{ matrix.gvsbuild-arch }}\\release\\bin" >> $GITHUB_PATH
          GTK_PKG="C:/gtk-build/gtk/${{ matrix.gvsbuild-arch }}/release/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=$GTK_PKG" >> $GITHUB_ENV

      - name: Configure
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from releng.meson_configure import main; main()" `
              . `
              --host=windows-${{ matrix.arch }} `
              --enable-shared `
              --without-prebuilds=sdk `
              "--prefix=$env:RUNNER_TEMP\frida-prefix" `
              -- --force-fallback-for=openssl,libnghttp2 -Dcompiler_backend=disabled -Dtests=disabled

      - name: Compile
        run: python releng/meson/meson.py compile -C build

      - name: Install
        run: python releng/meson/meson.py install -C build --no-rebuild --skip-subprojects

      - name: List installed files
        shell: bash
        run: find "$RUNNER_TEMP/frida-prefix" -type f | sort
