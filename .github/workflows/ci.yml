name: CI

on:
  push:
    branches:
      - windows-shared
  workflow_dispatch:

jobs:
  windows-shared:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install meson ninja gvsbuild

      - name: Restore GTK cache
        id: gtk-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\gtk-build
          key: ${{ runner.os }}-gvsbuild-v3

      - name: Build GTK dependencies
        if: steps.gtk-cache.outputs.cache-hit != 'true'
        run: gvsbuild build --ninja-opts -j2 gtk4 gobject-introspection json-glib libsoup3

      - name: Save GTK cache
        if: steps.gtk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\gtk-build
          key: ${{ runner.os }}-gvsbuild-v3

      - name: Set up GTK environment
        shell: bash
        run: |
          echo "C:\\gtk-build\\gtk\\x64\\release\\bin" >> $GITHUB_PATH
          GTK_PKG="C:/gtk-build/gtk/x64/release/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=$GTK_PKG" >> $GITHUB_ENV

      - name: Debug deps
        shell: bash
        run: |
          echo "=== nghttp2 check ==="
          pkg-config --modversion libnghttp2 2>&1 || echo "NOT FOUND"
          pkg-config --cflags libnghttp2 2>&1 || echo "NO CFLAGS"
          echo ""
          echo "=== Checking Python pkgconfig dir ==="
          ls "C:/hostedtoolcache/windows/Python/3.12.10/x64/lib/pkgconfig/" 2>/dev/null | head -20 || echo "none"

      - name: Configure
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from releng.meson_configure import main; main()" `
              . `
              --enable-shared `
              --without-prebuilds=sdk `
              "--prefix=$env:RUNNER_TEMP\frida-prefix" `
              -- --force-fallback-for=openssl,libnghttp2 -Dcompiler_backend=disabled

      - name: Compile
        run: python releng/meson/meson.py compile -C build

      - name: Install
        run: python releng/meson/meson.py install -C build --no-rebuild --skip-subprojects

      - name: List installed files
        shell: bash
        run: find "$RUNNER_TEMP/frida-prefix" -type f | sort
